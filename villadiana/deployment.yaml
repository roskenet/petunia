apiVersion: apps/v1
kind: Deployment
metadata:
  name: villadiana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: villadiana
  template:
    metadata:
      labels:
        app: villadiana
    spec:
      containers:
      - name: villadiana
        image: roskenet/villadiana:3.13.0
        env:
        - name: KEYCLOAK_SECRET
          value: lgb0JOFsrFdtw08nw6MyTpv5vQG9rrGO
        - name: KEYCLOAK_ISSUER_URI
          value: https://auth.roskenet.de/realms/petunia
        - name: KEYCLOAK_TOKEN_URI
          value: https://auth.roskenet.de/realms/petunia/protocol/openid-connect/token
        - name: REDIS_SECRET
          value: password
        ports:
        - name: www
          containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
  name: villadiana
spec:
  selector:
    app: villadiana
  ports:
  - protocol: TCP
    port: 8080
    targetPort: www

