apiVersion: apps/v1
kind: Deployment
metadata:
  name: axillaris
spec:
  replicas: 1
  selector:
    matchLabels:
      app: axillaris
  template:
    metadata:
      labels:
        app: axillaris
    spec:
      containers:
      - name: axillaris
        image: roskenet/axillaris:2.9.0
        imagePullPolicy: IfNotPresent
        env:
        - name: KEYCLOAK_SECRET
          value: c9hJU1gWb59MH6EVULVIMYB6leRL37ex
        ports:
        - name: www
          containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
  name: axillaris
spec:
  selector:
    app: axillaris
  ports:
  - protocol: TCP
    port: 80
    targetPort: www

---

